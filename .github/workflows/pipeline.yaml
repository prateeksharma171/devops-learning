name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v5

    - name: set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 25
        cache: 'npm'

    - name: install dependencies
      run: npm install

    - name: run test
      run: npm run test